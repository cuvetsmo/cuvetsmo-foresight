name: Deploy to Vercel

# Manual deploy via Vercel CLI. The cuvetsmo GitHub org doesn't have the
# Vercel GitHub App installed, so we deploy from CI using the Vercel CLI
# plus a token stored as a repository secret.
#
# Manual-only until the three secrets are set in this repo:
#   - VERCEL_TOKEN      — https://vercel.com/account/tokens
#   - VERCEL_ORG_ID     — Vercel team or user scope ID
#   - VERCEL_PROJECT_ID — set after first `vercel link`
#
# Once secrets exist, flip the trigger back to `on: push: branches: [main]`
# for auto-deploy. Until then, run manually via:
#     gh workflow run "Deploy to Vercel"
# or via the Actions tab.

on:
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — skip if secrets are missing
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        run: |
          echo "::warning::VERCEL_TOKEN is not set in this repo. Skipping deploy."
          exit 0

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifacts
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
